<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema Técnico - Controle de Toner</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<h2>Calculadora de Toner</h2>

<select id="modelo">
<option value="">Selecione o modelo</option>
<option value="brother">Brother 6902</option>
<option value="kyocera3655">Kyocera 3655</option>
<option value="kyocera5500">Kyocera 5500</option>
</select>

<input type="number" id="peso" placeholder="Informe o peso total (g)">

<button onclick="calcular()">Calcular</button>

<h3 id="info"></h3>

<div class="progress">
<div class="progress-bar" id="barra">0%</div>
</div>

<div class="status" id="nivel"></div>

</div>

<!-- BOTÃO INVISÍVEL -->
<button class="botao-secreto" onclick="acessoCodigo()"></button>

<script src="script.js"></script>

</body>
</html>
